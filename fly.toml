app = "coloring-books-api"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "pages_data"
  destination = "/pages"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1